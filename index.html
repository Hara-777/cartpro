<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopHub - Online Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">🛍️ ShopHub</div>
            <div class="nav">
                <input type="text" id="searchBox" class="search-box" placeholder="Search products...">
                <a href="cart.html" class="cart-link">
                    🛒 Cart <span id="cartCount" class="badge">0</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Filter Section -->
    <section class="filters">
        <div class="container">
            <select id="categoryFilter" class="filter-select">
                <option value="">All Categories</option>
                <option value="electronics">Electronics</option>
                <option value="fashion">Fashion</option>
                <option value="home">Home & Kitchen</option>
                <option value="books">Books</option>
            </select>

            <select id="sortFilter" class="filter-select">
                <option value="">Sort By</option>
                <option value="price-low">Price: Low to High</option>
                <option value="price-high">Price: High to Low</option>
                <option value="name">Product Name</option>
            </select>
        </div>
    </section>

    <!-- Main Content -->
    <main class="container">
        <section class="products">
            <div id="productsList" class="products-grid"></div>
        </section>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 ShopHub. All rights reserved. Made with ❤️</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
